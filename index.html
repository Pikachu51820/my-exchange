<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tsunami Exchange | Официальный партнер</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0f172a; color: white; margin: 0; padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        h1 { text-align: center; color: #38bdf8; }
        .exchange-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .pair-card { background: #334155; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .rate { color: #4ade80; font-weight: bold; font-size: 18px; }
        .btn { background: #38bdf8; color: #0f172a; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #0ea5e9; transform: scale(1.05); }
        #status { text-align: center; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tsunami Exchange API Platform</h1>
    <div id="status">📡 Синхронизация с API Tsunami Cash...</div>
    
    <div class="exchange-grid" id="grid"></div>

    <hr style="margin: 40px 0; border: 0; border-top: 1px solid #334155;">
    <a href="https://t.me" style="display: block; text-align: center; color: #38bdf8; text-decoration: none; font-size: 20px; font-weight: bold;">
        🤖 ЗАПУСТИТЬ ОБМЕН В TELEGRAM
    </a>
</div>

<script>
    const API_KEY = 'EX_41F12F142E8E0A94ADEA7F98328E9A6243A8B014';
    const REF_ID = 'ur1jj3f57lg';
    // Прокси для работы API в браузере
    const PROXY = 'https://allorigins.win';
    const JSON_DATA = 'https://tsunami.cash';

    async function initExchange() {
        try {
            const res = await fetch(PROXY + encodeURIComponent(JSON_DATA));
            const data = await res.json();
            
            const grid = document.getElementById('grid');
            document.getElementById('status').innerText = '✅ Данные API обновлены';
            grid.innerHTML = '';

            // Выводим только основные направления
            const main = ['BTC', 'ETH', 'USDT', 'SBERRUB', 'TCSBRUB'];
            
            data.forEach(item => {
                if (main.includes(item.from)) {
                    const card = document.createElement('div');
                    card.className = 'pair-card';
                    card.innerHTML = `
                        <div>
                            <div style="font-size: 14px; color: #94a3b8;">${item.from} ➔ ${item.to}</div>
                            <div class="rate">${parseFloat(item.in).toFixed(2)}</div>
                        </div>
                        <a href="https://tsunami.cash{item.from.toLowerCase()}-to-${item.to.toLowerCase()}?ref=${REF_ID}" target="_blank" class="btn">ОБМЕНЯТЬ</a>
                    `;
                    grid.innerHTML += card.outerHTML;
                }
            });
        } catch (e) {
            document.getElementById('status').innerText = '❌ Ошибка API. Используйте Telegram бот.';
        }
    }

    initExchange();
</script>
</body>
</html>
