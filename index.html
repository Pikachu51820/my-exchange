<script>
    // Используем прокси для обхода блокировки CORS
    const PROXY_URL = 'https://allorigins.win';
    const JSON_URL = encodeURIComponent('https://www.tsunami.cash/service/export/json/5J1hbq9livo/');
    const REF_LINK = 'tsunami.cash/ref/ur1jj3f57lg/';

    async function loadRates() {
        try {
            // Запрос через прокси-сервер
            const response = await fetch(PROXY_URL + JSON_URL);
            const data = await response.json();
            const tableBody = document.getElementById('tableBody');
            
            // Список валют, которые мы хотим видеть в таблице
            const popular = ['BTC', 'ETH', 'USDT', 'TRX', 'RUB', 'SBERRUB', 'TCSBRUB', 'CARDRUB'];
            
            tableBody.innerHTML = ''; 

            data.forEach(item => {
                // Если валюта в списке популярных - добавляем в таблицу
                if (popular.includes(item.from)) {
                    const row = `
                        <tr>
                            <td><b>${item.from}</b></td>
                            <td>${item.to}</td>
                            <td>1 ${item.from} = ${parseFloat(item.in).toFixed(2)} ${item.to}</td>
                            <td><a href="${REF_LINK}" target="_blank" class="btn-exchange">Обменять</a></td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                }
            });
        } catch (error) {
            console.error(error);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="4">Ошибка загрузки курсов. Подождите 10 секунд и обновите страницу.</td></tr>';
        }
    }

    loadRates();
    // Обновляем данные каждые 5 минут
    setInterval(loadRates, 300000);
</script>
